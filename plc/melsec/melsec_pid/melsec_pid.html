    <link rel="stylesheet" href="../../../assets/css/styles.css">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 2rem 1rem 2rem 5rem;
        background: transparent !important;
        color: #ecf0f1;
        font-family: 'Poppins', 'Inter', sans-serif;
      }

      body.menu-expanded {
        padding-left: 16rem;
      }

      .page-content {
        position: relative;
        z-index: 1;
      }

      .settings-content {
        max-width: 960px;
        width: 100%;
        margin: 0 auto;
        padding: 30px;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(0, 188, 212, 0.3);
        border-radius: 14px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      .settings-content h2 {
        margin: 0 0 12px;
        color: #00bcd4;
        font-size: 2rem;
        text-shadow: 0 0 16px rgba(0, 188, 212, 0.45);
      }

      .settings-content p {
        margin: 0 0 24px;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      .image-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 20px;
        margin: 24px 0 30px;
      }

      .image-grid img {
        width: 100%;
        display: block;
        border-radius: 12px;
        border: 1px solid rgba(0, 188, 212, 0.28);
        background: rgba(0, 0, 0, 0.25);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }

      .download-link {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 10px;
        color: #ecf0f1;
        text-decoration: none;
        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(0, 188, 212, 0.3);
        transition: all 0.3s ease;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .download-link:hover {
        border-color: #0ff;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
        transform: translateY(-3px);
      }

      @media (max-width: 768px) {
        body,
        body.menu-expanded {
          padding: 5rem 0.75rem 1rem calc(var(--nav--width, 62px) + 0.75rem);
        }

        .settings-content {
          padding: 20px;
        }

        .settings-content h2 {
          font-size: 1.5rem;
        }
      }

      @media (max-width: 480px) {
        body,
        body.menu-expanded {
          padding: 4.75rem 0.5rem 0.75rem calc(var(--nav--width, 62px) + 0.5rem);
        }

        .settings-content {
          padding: 16px 14px;
        }

        .image-grid {
          grid-template-columns: 1fr;
        }

        .download-link {
          width: 100%;
          text-align: center;
        }
      }
    </style>
</head>
