<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImagineTech ImMel</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
      body {
        background: transparent !important;
        color: #ecf0f1;
        margin: 0;
        padding: 2rem 1rem 2rem 5rem;
      }

      body.menu-expanded {
        padding-left: 16rem;
      }

      .page-content {
        position: relative;
        z-index: 1;
      }

      .tool-content {
        padding: 32px;
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 14px;
        border: 1px solid rgba(0, 188, 212, 0.3);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      .tool-content h2 {
        margin: 0 0 18px;
        color: #00bcd4;
      }

      .tool-content p {
        margin: 0;
        font-size: 1.08rem;
        line-height: 1.7;
      }

      @media (max-width: 768px) {
        body,
        body.menu-expanded {
          padding: 5rem 0.75rem 1rem calc(var(--nav--width, 62px) + 0.75rem);
        }

        .tool-content {
          padding: 20px;
        }
      }

      @media (max-width: 480px) {
        body,
        body.menu-expanded {
          padding: 4.75rem 0.5rem 0.75rem calc(var(--nav--width, 62px) + 0.5rem);
        }

        .tool-content {
          padding: 16px 14px;
        }
      }

</head>
<body class="menu-expanded">

          <div><a href="../article/company.html" class="nav__link"><img src="../Icons/Menu/company.png" class="nav__icon" alt="Company"><span class="nav_name">Company</span></a></div>
          <div><a href="../article/links.html" class="nav__link"><img src="../Icons/Menu/link_icon.png" class="nav__icon" alt="Link"><span class="nav_name">Link</span></a></div>

    </nav>

    window.initEarthScene({
      canvasId: 'matrixCanvas',

    });
  </script>
