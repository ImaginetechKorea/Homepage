<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> 
    <base href="https://imaginetech.kr/plc/">
    <style> 
      body {
        background: transparent !important;
        color: #ecf0f1;
      } 
      
      .settings-content {
        padding: 25px;
        max-width: 900px;
        margin: 0 auto;
        background: rgba(3, 3, 8, 0.9);
        border-radius: 15px;
        border: 2px solid rgba(0, 188, 212, 0.4);
        backdrop-filter: blur(15px);
        box-shadow: 
          0 8px 32px rgba(0, 0, 0, 0.6),
          0 0 25px rgba(0, 188, 212, 0.15);
      }
      
      .settings-content h2 {
        color: #00bcd4;
        font-family: 'Orbitron', sans-serif;
        border-bottom: 2px solid #4682b4;
        padding-bottom: 12px;
        margin-bottom: 20px;
        margin-top: 0;
        text-shadow: 0 0 20px rgba(0, 188, 212, 0.6);
        font-size: 1.8rem;
        letter-spacing: 1px;
      }
      
      .settings-content a {
        display: block;
        padding: 18px 25px;
        margin: 15px 0;
        background: linear-gradient(135deg, 
          rgba(70, 130, 180, 0.3) 0%, 
          rgba(26, 26, 46, 0.7) 100%);
        border-radius: 10px;
        text-decoration: none;
        color: #ecf0f1;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(0, 188, 212, 0.4);
        font-size: 1.1rem;
        font-weight: 500;
        position: relative;
        overflow: hidden;
      }
      
      .settings-content a::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, 
          transparent 0%,
          rgba(0, 255, 255, 0.2) 50%,
          transparent 100%);
        transition: left 0.6s ease;
      }
      
      .settings-content a:hover::before {
        left: 100%;
      }
      
      .settings-content a:hover {
        background: linear-gradient(135deg, 
          rgba(0, 188, 212, 0.4) 0%, 
          rgba(70, 130, 180, 0.5) 100%);
        transform: translateY(-3px) scale(1.03);
        border-color: #0ff;
        box-shadow: 
          0 12px 40px rgba(0, 0, 0, 0.5),
          0 0 30px rgba(0, 188, 212, 0.4);
        text-shadow: 0 0 15px rgba(0, 255, 255, 0.9);
      }
      
      /* 모바일 최적화 */
      @media (max-width: 768px) {
        .settings-content {
          padding: 15px;
        }
        
        .settings-content h2 {
          font-size: 1.3rem;
        }
        
        .settings-content a {
          padding: 15px 12px;
          margin: 10px 0;
          font-size: 1rem;
          min-height: 48px; /* 터치 친화적 크기 */
          display: flex;
          align-items: center;
        }
      }
      
      @media (max-width: 480px) {
        .settings-content {
          padding: 10px;
        }
        
        .settings-content h2 {
          font-size: 1.2rem;
        }
        
        .settings-content a {
          padding: 18px 15px;
          font-size: 1.1rem;
        }
      }
    </style>
</head>
<body>  
    <div class="settings-content"> 
        <h2><span class="icon"></span>MELSEC PID</h2>
        <a href="./melsec/melsec_pid/melsec_pid.html" target="_blank">MELSEC PID CONTROL EXAMPLE</a>
    </div>   
</body>
</html>
