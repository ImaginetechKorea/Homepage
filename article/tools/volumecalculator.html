<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부피 단위 변환기</title>
  <style>
    body {
      font-family: 'Poppins', 'Inter', sans-serif;
      background: #181c2f;
      color: #ecf0f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .converter-container {
      background: rgba(0,0,0,0.25);
      border: 1px solid #00bcd4;
      border-radius: 14px;
      padding: 32px 24px 24px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-width: 320px;
      max-width: 90vw;
    }
    input[type="number"] {
      width: 120px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #00bcd4;
      font-size: 1.1rem;
      margin-bottom: 12px;
      background: #23294a;
      color: #ecf0f1;
    }
    select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #00bcd4;
      background: #23294a;
      color: #ecf0f1;
      font-size: 1rem;
      margin-left: 8px;
      margin-right: 8px;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #00bcd4;
      color: #181c2f;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 8px;
      font-weight: 600;
    }
    .result {
      margin-top: 18px;
      font-size: 1.2rem;
      color: #00ffc8;
      min-height: 1.5em;
    }
    .error {
      color: #ff4d4f;
    }
  </style>
</head>
<body>
  <div class="converter-container">
    <h2>부피 단위 변환기</h2>
    <form id="volume-form" autocomplete="off">
      <input type="number" id="volume-value" placeholder="값 입력" required step="any">
      <select id="from-unit">
        <option value="m3">세제곱미터(m³)</option>
        <option value="l">리터(L)</option>
        <option value="ml">밀리리터(mL)</option>
        <option value="cm3">세제곱센티미터(cm³)</option>
        <option value="mm3">세제곱밀리미터(mm³)</option>
        <option value="ft3">세제곱피트(ft³)</option>
        <option value="in3">세제곱인치(in³)</option>
        <option value="yd3">세제곱야드(yd³)</option>
        <option value="gal">갤런(US gal)</option>
      </select>
      <span>→</span>
      <select id="to-unit">
        <option value="m3">세제곱미터(m³)</option>
        <option value="l">리터(L)</option>
        <option value="ml">밀리리터(mL)</option>
        <option value="cm3">세제곱센티미터(cm³)</option>
        <option value="mm3">세제곱밀리미터(mm³)</option>
        <option value="ft3">세제곱피트(ft³)</option>
        <option value="in3">세제곱인치(in³)</option>
        <option value="yd3">세제곱야드(yd³)</option>
        <option value="gal">갤런(US gal)</option>
      </select>
      <button type="submit">변환</button>
    </form>
    <div class="result" id="result"></div>
  </div>
  <script>
    const unitToM3 = {
      m3: 1,
      l: 0.001,
      ml: 0.000001,
      cm3: 0.000001,
      mm3: 0.000000001,
      ft3: 0.0283168466,
      in3: 0.000016387064,
      yd3: 0.764554858,
      gal: 0.00378541178 // US gallon
    };
    document.getElementById('volume-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const value = parseFloat(document.getElementById('volume-value').value);
      const from = document.getElementById('from-unit').value;
      const to = document.getElementById('to-unit').value;
      let resultDiv = document.getElementById('result');
      if (isNaN(value)) {
        resultDiv.textContent = '숫자를 입력하세요.';
        resultDiv.className = 'result error';
        return;
      }
      // 변환: 입력값을 m³로 변환 후 원하는 단위로 변환
      const m3 = value * unitToM3[from];
      const converted = m3 / unitToM3[to];
      resultDiv.textContent = value + ' ' + from + ' = ' + converted + ' ' + to;
      resultDiv.className = 'result';
    });
  </script>
</body>
</html>
