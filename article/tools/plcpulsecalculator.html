<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLC Pulse-길이 변환기</title>
  <style>
    body {
      font-family: 'Poppins', 'Inter', sans-serif;
      background: #181c2f;
      color: #ecf0f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .converter-container {
      background: rgba(0,0,0,0.25);
      border: 1px solid #00bcd4;
      border-radius: 14px;
      padding: 32px 24px 24px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-width: 340px;
      max-width: 95vw;
    }
    input[type="number"] {
      width: 120px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #00bcd4;
      font-size: 1.1rem;
      margin-bottom: 12px;
      background: #23294a;
      color: #ecf0f1;
    }
    select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #00bcd4;
      background: #23294a;
      color: #ecf0f1;
      font-size: 1rem;
      margin-left: 8px;
      margin-right: 8px;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      background: #00bcd4;
      color: #181c2f;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 8px;
      font-weight: 600;
    }
    .result {
      margin-top: 18px;
      font-size: 1.2rem;
      color: #00ffc8;
      min-height: 1.5em;
    }
    .error {
      color: #ff4d4f;
    }
    .desc {
      font-size: 0.95em;
      color: #00bcd4;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="converter-container">
    <h2>PLC Pulse-길이 변환기</h2>
    <div class="desc">기어비, 롤 지름, 엔코더 해상도(Resolution)를 고려하여 Pulse ↔ mm 상호 변환</div>
    <form id="pulse-form" autocomplete="off">
      <label>기어비 (Gear Ratio): <input type="number" id="gear" value="1" step="any" min="0.0001"></label><br>
      <label>롤 지름 (mm): <input type="number" id="diameter" step="any" min="0.0001"></label><br>
      <label>엔코더 해상도 (Pulse/Rev): <input type="number" id="resolution" step="1" min="1"></label><br>
      <label>변환 방향:
        <select id="mode">
          <option value="pulse2mm">Pulse → mm</option>
          <option value="mm2pulse">mm → Pulse</option>
        </select>
      </label><br><br>
      <label id="input-label">Pulse 값: <input type="number" id="input-value" step="any"></label><br>
      <button type="submit">변환</button>
    </form>
    <div class="result" id="result"></div>
  </div>
  <script>
    function getCircumference(diameter) {
      return Math.PI * diameter;
    }
    function pulseToMm(pulse, gear, diameter, resolution) {
      // 1회전 당 이동거리 = 원주 * 기어비
      // 1 pulse 당 이동거리 = (원주 * 기어비) / 해상도
      return pulse * (getCircumference(diameter) * gear / resolution);
    }
    function mmToPulse(mm, gear, diameter, resolution) {
      // 1 pulse 당 이동거리 = (원주 * 기어비) / 해상도
      return mm / (getCircumference(diameter) * gear / resolution);
    }
    // 입력 필드 라벨 동적 변경
    document.getElementById('mode').addEventListener('change', function() {
      var mode = this.value;
      var label = document.getElementById('input-label');
      if (mode === 'pulse2mm') {
        label.innerHTML = 'Pulse 값: <input type="number" id="input-value" step="any">';
      } else {
        label.innerHTML = '길이 (mm): <input type="number" id="input-value" step="any">';
      }
    });
    document.getElementById('pulse-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var gear = parseFloat(document.getElementById('gear').value);
      var diameter = parseFloat(document.getElementById('diameter').value);
      var resolution = parseInt(document.getElementById('resolution').value);
      var mode = document.getElementById('mode').value;
      var inputValue = parseFloat(document.getElementById('input-value').value);
      var resultDiv = document.getElementById('result');
      if (isNaN(gear) || gear <= 0 || isNaN(diameter) || diameter <= 0 || isNaN(resolution) || resolution <= 0) {
        resultDiv.textContent = '기어비, 롤 지름, 해상도를 올바르게 입력하세요.';
        resultDiv.className = 'result error';
        return;
      }
      if (isNaN(inputValue)) {
        resultDiv.textContent = (mode === 'pulse2mm' ? 'Pulse' : '길이(mm)') + ' 값을 입력하세요.';
        resultDiv.className = 'result error';
        return;
      }
      if (mode === 'pulse2mm') {
        var mm = pulseToMm(inputValue, gear, diameter, resolution);
        resultDiv.textContent = inputValue + ' Pulse → ' + mm.toFixed(4) + ' mm';
      } else {
        var pulse = mmToPulse(inputValue, gear, diameter, resolution);
        resultDiv.textContent = inputValue + ' mm → ' + pulse.toFixed(2) + ' Pulse';
      }
      resultDiv.className = 'result';
    });
  </script>
</body>
</html>
