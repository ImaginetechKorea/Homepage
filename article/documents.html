<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
      body {
        background: transparent !important;
        font-family: 'Poppins', 'Inter', sans-serif;
        color: #ecf0f1;
        margin: 0;
        padding: 2rem 1rem 2rem 5rem;
      }

      body.menu-expanded {
        padding-left: 16rem;
      }

      .page-content {
        position: relative;
        z-index: 1;
      }
      
      .settings-content {
        max-width: 1920px;
        width: 100%;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 14px;
        border: 1px solid rgba(0, 188, 212, 0.3);
        backdrop-filter: blur(10px);
        padding: 30px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      
      .link h2 {
        color: #00bcd4;
        font-weight: 600;
        margin-bottom: 15px;
        margin-top: 30px;
      }
      
      .link a {
        color: #4682b4;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      
      .link a:hover {
        color: #00bcd4;
        text-shadow: 0 0 5px rgba(0, 188, 212, 0.3);
      }

      @media (max-width: 768px) {
        body,
        body.menu-expanded {
          padding: 5rem 0.75rem 1rem calc(var(--nav--width, 62px) + 0.75rem);
        }

        .settings-content {
          padding: 22px 18px;
        }
      }

      @media (max-width: 480px) {
        body,
        body.menu-expanded {
          padding: 4.75rem 0.5rem 0.75rem calc(var(--nav--width, 62px) + 0.5rem);
        }

        .settings-content {
          padding: 18px 14px;
        }
      }
      </style>
</head>
<body>
<main class="page-content">
<div class="settings-content">
    <div class="link">
            <h2>GMMK Ethernet Protocol</h2>
            <a href="./documents/PLC03. [GxL-EUTB]GMMK Ethernet Protocol.pdf"
                target="_blank">GMMK Ethernet Protocol</a>
            <br>
            <h2>MELSEC Communication Protocol Reference Manual</h2>
            <a href="./documents/MELSEC Communication Protocol Reference Manual.pdf" 
                target="_blank">MELSEC Communication Protocol Reference Manual</a>
            <br>
            <h2>Modbus_Application_Protocol_V1_1b</h2>
            <a href="./documents/Modbus_Application_Protocol_V1_1b.pdf" 
                target="_blank">Modbus_Application_Protocol_V1_1b</a>
            <br>
    </div> 
</div>
</main>
</body>
</html>
