<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        background: linear-gradient(135deg, #000408 0%, #0a0a0f 25%, #1a1a2e 75%, #0f1419 100%) !important;
        font-family: 'Poppins', 'Inter', sans-serif;
        color: #ecf0f1;
        margin: 0;
        padding: 20px;
      }
      
      .settings-content {
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
        background: rgba(3, 3, 8, 0.8);
        border-radius: 18px;
        border: 2px solid rgba(0, 188, 212, 0.4);
        backdrop-filter: blur(15px);
        padding: 30px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 188, 212, 0.1);
      }
      
      .messenger-card h2 {
        color: #00bcd4;
        font-weight: 600;
        margin-bottom: 20px;
      }
      
      .messenger-card p {
        line-height: 1.6;
      }

      @media (max-width: 480px) {
        body {
          padding: 12px;
        }

        .settings-content {
          padding: 20px 16px;
        }
      }
      </style>
</head>
<body>
    <div class="settings-content">
        <div class="messenger-card">
            <h2>Overview</h2>
            <p>Welcome to your settings.</p>
        </div>
    </div>
</body>
</html>
