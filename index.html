<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Define the character set and viewport settings for responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1a1a2e">
    
    <!-- Google Fonts for Professional Tech Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Link to the external CSS file for styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Set the title of the page -->
    <title>Imaginetech</title>
    
    <!-- Immediate animation start script -->
    <script>
        // Force animations to start immediately when CSS loads
        document.addEventListener('DOMContentLoaded', function() {
            const root = document.documentElement;
            root.style.setProperty('--animation-state', 'running');
            root.style.setProperty('--animation-duration', '3s');
            
            // Force all elements with animations to start immediately
            const animatedElements = document.querySelectorAll('.l-navbar, .nav__link, .active');
            animatedElements.forEach(el => {
                el.style.animationPlayState = 'running';
                el.style.animationDelay = '0s';
                el.style.animationIterationCount = 'infinite';
            });
        });
        
        // Also execute immediately
        setTimeout(() => {
            const root = document.documentElement;
            root.style.setProperty('--animation-state', 'running');
        }, 0);
    </script>
    <title>Imaginetech</title>
    <!-- Open Graph Meta Tags for link preview -->
    <meta property="og:title" content="Imaginetech" />
    <meta property="og:image" content="https://imaginetech.kr/image/Imaginetech_CI_half.png" />
    <meta property="og:description" content="Welcome to Imaginetech!" />
    <meta property="og:url" content="https://imaginetech.kr" />
    <meta property="og:type" content="website" />
    <style>
      /* Force animations to always run */
      * {
        animation-play-state: running !important;
        animation-fill-mode: both !important;
        animation-iteration-count: infinite !important;
        animation-delay: 0s !important;
      }
      
      /* Immediate cyber effects */
      .l-navbar {
        animation: navbarGlow 5s ease-in-out infinite !important;
        animation-play-state: running !important;
      }
      
      .l-navbar::before {
        animation: borderPulse 3s ease-in-out infinite !important;
        animation-play-state: running !important;
      }
      
      .active {
        animation: activeGlow 2s ease-in-out infinite !important;
        animation-play-state: running !important;
      }
      
      #matrixCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: linear-gradient(135deg, #000408 0%, #0a0a0f 25%, #1a1a2e 75%, #0f1419 100%) !important;
        pointer-events: none;
      }  
      
      body {
        background: transparent !important;
        color: #ecf0f1;
      }
      
      /* Prevent white flash */
      html {
        background-color: #000408 !important;
      }
      
      /* Force dark theme on all elements */
      * {
        background-color: transparent;
      }
      
      #content-container .glow-text,
      #content-container .glow-text * {
        animation: none !important;
        text-shadow: 0 0 18px rgba(135, 206, 250, 0.28) !important;
      }
    </style> 
</head>
<body id="body-pd">
    <canvas id="matrixCanvas"></canvas>
    <!-- ImMel 팝업 -->
    <div id="immel-popup" style="
      display: none;
      position: fixed;
      top: 50px;
      right: 50px;
      z-index: 20000;
      background: rgba(10,18,34,0.98);
      border: 2px solid #00bcd4;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      padding: 32px 28px 24px 28px;
      min-width: 320px;
      max-width: 90vw;
      color: #ecf0f1;
      font-family: 'Poppins', 'Inter', sans-serif;
      text-align: center;
      animation: popupFadeIn 0.5s;
    ">
      <div style="font-size:1.3rem;font-weight:600;margin-bottom:18px;">ImMel : Melsec PLC Monitoring Tools</div>
      <br>
      <a href="#" class="nav__link" data-page="./article/ImMel.html"
        style="border: none;"
        onclick="document.getElementById('immel-popup').style.display='none';">
        >>> Move to ImMel Download Page
      </a>
      <br>
      <button id="immel-popup-close" style="
        margin-top:18px;
        background:transparent;
        color:#00bcd4;
        border:none;
        font-size:1.1rem;
        cursor:pointer;
        text-decoration:underline;
      ">Close</button>
    </div>
    <style> 
      #immel-popup { animation-iteration-count: 1 !important; }
      @keyframes popupFadeIn {
        from { opacity: 0; transform: translateY(-30px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
    </style>
    <!-- Sidebar Navigation Container -->
    <div class="l-navbar" id="navbar">
        <nav class="nav">
          <div>
            <!-- Sidebar brand section with the navigation toggle icon -->
            <div class="nav__brand"> 
              <img id="nav-toggle" src="./Icons/Menu/menu-Hamburger.png" class="nav__toggle" alt="nav-toggle">
            </div>

            <!-- Navigation List Container -->
            <div class="nav__list">
              <!-- Navigation List: Main link -->
              <div>
                <a href="#" class="nav__link active" data-page="./article/main.html">
                  <img src="./Icons/Menu/home-outline.png" class="nav__icon"> 
                  <span class="nav_name">Main</span>
                </a>
              </div> 

              <!-- Navigation link: Company page -->
              <div>  
                <a href="#" class="nav__link" data-page="./article/company.html">
                  <img src="./Icons/Menu/company.png" class="nav__icon"> 
                  <span class="nav_name">Company</span>
                </a> 
              </div>

              <!-- Navigation link: Link page -->
              <div>  
                <a href="#" class="nav__link" data-page="./article/links.html">
                  <img src="./Icons/Menu/link_icon.png" class="nav__icon"> 
                  <span class="nav_name">Link</span>
                </a> 
              </div>

              <!-- Navigation link: Application page -->
              <div>  
                <a href="#" class="nav__link" data-page="./article/applications.html">
                  <img src="./Icons/Menu/applications.png" class="nav__icon"> 
                  <span class="nav_name">Application</span>
                </a> 
              </div>
              
              <!-- Navigation link: documents page -->
              <div> 
                <a href="#" class="nav__link" data-page="./article/documents.html">
                  <img src="./Icons/Menu/documents.png" class="nav__icon">
                  <span class="nav_name">Documents</span>
                </a>
              </div>        
              <!-- Navigation link: PLC page -->
              <div> 
                <a href="#" class="nav__link" data-page="./article/plc.html">
                  <img src="./Icons/Menu/plc.png" class="nav__icon">
                  <span class="nav_name">PLC</span>
                </a>
              </div>
              <div>
                <a href="#" class="nav__link" data-page="./article/ImMel.html">
                  <img src="./Icons/Menu/ImMel.png" class="nav__icon" alt="ImMel">
                  <span class="nav_name">ImMel</span>
                </a>
              </div>
            </div>
          </div>
        </nav>
    </div> 

    <!-- Main Content Area -->
    <main id="content-area">  
        <!-- Container for dynamically loaded content -->
        <div id="content-container"> 
        </div>
    </main> 
    <!-- Link to shared sidebar logic and main page logic -->
    <script src="./assets/js/sidebar.js"></script>
    <script src="./assets/js/earth-scene.js"></script>
    <script src="./assets/js/main.js"></script> 
</body>
<script>
// ImMel 팝업 표시 로직
window.addEventListener('DOMContentLoaded', function() {
  var popup = document.getElementById('immel-popup');
  var closeBtn = document.getElementById('immel-popup-close');
  if (popup && closeBtn) {
    // 2초 후 팝업 표시
    setTimeout(function() {
      popup.style.display = 'block';
    }, 2000);
    // 닫기 버튼 클릭 시 팝업 숨김
    closeBtn.onclick = function() {
      popup.style.display = 'none';
    };
  }
});
</script>
</body>
</html>
